<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timéo Pedoussaut | Portfolio Cybersécurité & Infra</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #060b13;
            --card-bg: #0f172a;
            --card-hover: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --accent: #38bdf8;
            --accent-green: #34d399;
            --border: #1e293b;
            --glow: rgba(56, 189, 248, 0.15);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            scroll-behavior: smooth; 
        }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            line-height: 1.6; 
            overflow-x: hidden;
        }

        /* Barre de navigation */
        nav {
            position: fixed; top: 0; width: 100%;
            background-color: rgba(6, 11, 19, 0.8); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 1.2rem 2rem; display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; border-bottom: 1px solid var(--border);
        }
        nav .logo { 
            font-weight: 800; 
            color: var(--text-main); 
            font-size: 1.3rem; 
            letter-spacing: 1px;
        }
        nav .logo span { color: var(--accent); }
        nav ul { display: flex; list-style: none; gap: 2.5rem; }
        nav a { 
            color: #94a3b8; 
            text-decoration: none; 
            font-size: 0.95rem; 
            font-weight: 500;
            transition: var(--transition);
        }
        nav a:hover { color: var(--accent); text-shadow: 0 0 10px var(--glow); }

        /* --- EN-TÊTE / HERO SECTION DESIGN DEUX COLONNES --- */
        header {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 8rem 2rem 4rem 2rem;
            background: radial-gradient(circle at 80% 20%, #101b3d 0%, #060b13 60%);
            position: relative;
        }

        .hero-container {
            max-width: 1140px; width: 100%; display: grid;
            grid-template-columns: 1.2fr 0.8fr; gap: 4rem; align-items: center;
        }

        .hero-left { text-align: left; display: flex; flex-direction: column; gap: 1.5rem; }

        .profile-container {
            position: relative; width: 130px; height: 130px; margin-bottom: 1rem;
        }
        .profile-img {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 3px solid rgba(56, 189, 248, 0.5); position: relative; z-index: 2;
        }
        .profile-container::before {
            content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%; background: var(--accent); filter: blur(15px);
            opacity: 0.3; z-index: 1;
        }

        header h1 { font-size: 3.2rem; font-weight: 800; letter-spacing: -1px; line-height: 1.1; }
        header h1 span { color: var(--accent); }
        header .subtitle { font-size: 1.2rem; color: #94a3b8; max-width: 650px; font-weight: 400; }
        header .bio { font-size: 1.05rem; color: #cbd5e1; max-width: 600px; border-left: 3px solid var(--accent); padding-left: 1rem; margin: 0.5rem 0; }

        /* Bloc Statistiques à Droite pour meubler le vide */
        .hero-right {
            display: grid; grid-template-columns: 1fr; gap: 1.5rem;
        }
        .stat-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            padding: 2rem; border-radius: 16px;
            backdrop-filter: blur(8px);
            display: flex; flex-direction: column; gap: 0.5rem;
            transition: var(--transition);
        }
        .stat-card:hover { border-color: rgba(56, 189, 248, 0.3); transform: translateY(-3px); }
        .stat-number { font-size: 2.2rem; font-weight: 800; color: var(--accent-green); }
        .stat-label { font-size: 1rem; font-weight: 700; color: var(--text-main); }
        .stat-desc { font-size: 0.85rem; color: #64748b; }

        .btn {
            background: linear-gradient(135deg, #0ea5e9 0%, #38bdf8 100%); 
            color: #060b13; padding: 1rem 2.2rem;
            border-radius: 12px; text-decoration: none; font-weight: 700;
            display: inline-flex; align-items: center; gap: 0.8rem; width: fit-content;
            box-shadow: 0 4px 25px rgba(56, 189, 248, 0.25); transition: var(--transition);
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(56, 189, 248, 0.45); }
        
        .btn-secondary {
            background: rgba(30, 41, 59, 0.5); color: var(--text-main); border: 1px solid var(--border);
            padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; font-size: 0.85rem;
            font-weight: 600; display: inline-flex; align-items: center; gap: 0.5rem;
            margin-top: 1rem; width: fit-content; transition: var(--transition);
        }
        .btn-secondary:hover { background: var(--card-hover); border-color: var(--accent); }

        /* Sections */
        section { padding: 6rem 2rem; max-width: 1140px; margin: 0 auto; }
        section h2 { 
            font-size: 2.2rem; margin-bottom: 4rem; font-weight: 800;
            display: flex; align-items: center; gap: 1rem; letter-spacing: -0.5px;
        }
        section h2 i { color: var(--accent); }

        /* --- FRISE CHRONOLOGIQUE FLUIDE (DATES À GAUCHE) --- */
        .timeline { position: relative; display: flex; flex-direction: column; gap: 3rem; }
        .timeline::before {
            content: ''; position: absolute; left: 230px; top: 20px; bottom: 20px;
            width: 2px; background: linear-gradient(180deg, var(--accent) 0%, var(--border) 100%); opacity: 0.4;
        }
        .timeline-item { display: grid; grid-template-columns: 200px 1fr; gap: 4rem; position: relative; }
        .timeline-date { text-align: right; padding-top: 2.2rem; color: var(--accent-green); font-weight: 700; font-size: 0.95rem; letter-spacing: 0.5px; }
        .timeline-body {
            background: linear-gradient(145deg, #0f172a 0%, #0b1324 100%); padding: 2.5rem; border-radius: 20px;
            border: 1px solid var(--border); transition: var(--transition); position: relative;
            display: flex; flex-direction: column; gap: 1.5rem;
        }
        .timeline-body::after {
            content: ''; position: absolute; left: -35px; top: 28px; width: 10px; height: 10px; border-radius: 50%;
            background-color: var(--accent); box-shadow: 0 0 12px var(--accent); z-index: 5; transition: var(--transition);
        }
        .timeline-item:hover .timeline-body { transform: translateX(5px) translateY(-2px); border-color: rgba(56, 189, 248, 0.4); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 25px var(--glow); }
        .timeline-item:hover .timeline-body::after { background-color: var(--accent-green); box-shadow: 0 0 15px var(--accent-green); transform: scale(1.3); }
        
        .job-title h3 { font-size: 1.35rem; color: var(--text-main); font-weight: 700; line-height: 1.3; }
        .job-title .company { font-weight: 600; color: var(--accent); font-size: 1.05rem; margin-top: 0.2rem; }
        
        .job-details { list-style: none; display: flex; flex-direction: column; gap: 1rem; }
        .job-details li { position: relative; padding-left: 2.2rem; color: #cbd5e1; font-size: 1.02rem; }
        .job-details li::before { font-family: "Font Awesome 6 Free"; font-weight: 900; position: absolute; left: 0; top: 3px; color: var(--accent); font-size: 1rem; }
        .job-details li.tech::before { content: "\f120"; } 
        .job-details li.sec::before { content: "\f3ed"; }  
        .job-details li.user::before { content: "\f0c0"; } 
        .job-details li.proj::before { content: "\f0ae"; } 
        .job-details li.gear::before { content: "\f085"; } 
        .job-details li.route::before { content: "\f6ff"; } 

        /* --- GRILLES TECHNIQUES --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2.5rem; }
        .card { background: linear-gradient(145deg, #0f172a 0%, #0b1324 100%); padding: 3rem; border-radius: 20px; border: 1px solid var(--border); transition: var(--transition); }
        .card:hover { transform: translateY(-5px); border-color: rgba(56, 189, 248, 0.4); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 25px var(--glow); }
        .card h3 { color: var(--text-main); font-size: 1.4rem; margin-bottom: 1rem; font-weight: 700; }

        /* Badges */
        .skills-container { display: flex; flex-wrap: wrap; gap: 0.6rem; }
        .badge { background-color: rgba(56, 189, 248, 0.06); color: var(--accent); padding: 0.4rem 1rem; border-radius: 8px; font-size: 0.8rem; font-weight: 600; border: 1px solid rgba(56, 189, 248, 0.15); transition: var(--transition); }
        .timeline-item:hover .badge, .card:hover .badge { background-color: rgba(56, 189, 248, 0.15); border-color: rgba(56, 189, 248, 0.4); }
        .badge.tools { color: #cbd5e1; background-color: #0b1324; border-color: transparent; }

        /* Certifications */
        .cert-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; }
        .cert-item { background-color: var(--card-bg); padding: 1.8rem; border-radius: 16px; display: flex; align-items: center; gap: 1.25rem; border: 1px solid var(--border); transition: var(--transition); }
        .cert-item:hover { transform: scale(1.03); border-color: rgba(52, 211, 153, 0.4); background-color: var(--card-hover); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .cert-item i { color: var(--accent-green); font-size: 2rem; }
        .cert-item strong { font-size: 1.05rem; color: var(--text-main); }
        .cert-item small { color: #94a3b8; }

        /* Footer */
        footer { background-color: #020408; padding: 6rem 2rem; text-align: center; border-top: 1px solid var(--border); }
        .footer-info { max-width: 600px; margin: 0 auto 3rem; display: flex; justify-content: center; flex-wrap: wrap; gap: 3rem; }
        .footer-info-item { display: flex; align-items: center; gap: 0.75rem; color: #cbd5e1; font-weight: 500; text-decoration: none; transition: var(--transition); }
        .footer-info-item:hover { color: var(--accent); }
        .footer-info-item i { color: var(--accent); font-size: 1.3rem; }
        .social-links {
