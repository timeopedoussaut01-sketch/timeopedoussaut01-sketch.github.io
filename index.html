<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timéo Pedoussaut | Portfolio Cybersécurité & Infra</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #060b13;
            --card-bg: #0f172a;
            --card-hover: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --accent: #38bdf8;
            --accent-green: #34d399;
            --border: #1e293b;
            --glow: rgba(56, 189, 248, 0.15);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            scroll-behavior: smooth; 
        }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            line-height: 1.6; 
            overflow-x: hidden;
        }

        /* Barre de navigation */
        nav {
            position: fixed; top: 0; width: 100%;
            background-color: rgba(6, 11, 19, 0.8); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 1.2rem 2rem; display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; border-bottom: 1px solid var(--border);
        }
        nav .logo { 
            font-weight: 800; 
            color: var(--text-main); 
            font-size: 1.3rem; 
            letter-spacing: 1px;
        }
        nav .logo span { color: var(--accent); }
        nav ul { display: flex; list-style: none; gap: 2.5rem; }
        nav a { 
            color: #94a3b8; 
            text-decoration: none; 
            font-size: 0.95rem; 
            font-weight: 500;
            transition: var(--transition);
        }
        nav a:hover { color: var(--accent); text-shadow: 0 0 10px var(--glow); }

        /* En-tête / Hero Section */
        header {
            min-height: 100vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 2rem;
            background: radial-gradient(circle at 50% 40%, #101b3d 0%, #060b13 70%);
            position: relative;
        }

        .profile-container {
            position: relative;
            margin-bottom: 2rem;
            margin-top: 40px;
        }
        .profile-img {
            width: 160px; height: 160px; border-radius: 50%; object-fit: cover;
            border: 3px solid rgba(56, 189, 248, 0.5);
            position: relative; z-index: 2;
            transition: var(--transition);
        }
        .profile-container::before {
            content: ''; position: absolute; top: -6px; left: -6px; right: -6px; bottom: -6px;
            border-radius: 50%; background: var(--accent); filter: blur(20px);
            opacity: 0.35; z-index: 1; animation: pulse 4s infinite alternate;
        }
        header:hover .profile-img { transform: scale(1.03); border-color: var(--accent); }

        @keyframes pulse {
            0% { transform: scale(0.96); opacity: 0.25; }
            100% { transform: scale(1.04); opacity: 0.5; }
        }

        header h1 { font-size: 3.8rem; margin-bottom: 1rem; font-weight: 800; letter-spacing: -1px; }
        header h1 span { color: var(--accent); }
        header .subtitle { font-size: 1.3rem; color: #94a3b8; margin-bottom: 3rem; max-width: 800px; font-weight: 400; line-height: 1.5; }

        .btn {
            background: linear-gradient(135deg, #0ea5e9 0%, #38bdf8 100%); 
            color: #060b13; padding: 1rem 2.2rem;
            border-radius: 12px; text-decoration: none; font-weight: 700;
            display: inline-flex; align-items: center; gap: 0.8rem;
            box-shadow: 0 4px 25px rgba(56, 189, 248, 0.25);
            transition: var(--transition);
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(56, 189, 248, 0.45); }

        /* Sections */
        section { padding: 8rem 2rem; max-width: 1140px; margin: 0 auto; }
        section h2 { 
            font-size: 2.4rem; margin-bottom: 4rem; font-weight: 800;
            display: flex; align-items: center; gap: 1rem; letter-spacing: -0.5px;
        }
        section h2 i { color: var(--accent); }

        /* --- TIMELINE AVANCÉE --- */
        .timeline { 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            gap: 3rem; 
        }
        /* Ligne verticale conductrice arrière-plan */
        .timeline::before {
            content: ''; position: absolute; left: 30px; top: 20px; bottom: 20px;
            width: 2px; background: linear-gradient(180deg, var(--accent) 0%, var(--border) 100%);
            opacity: 0.6;
        }
        .timeline-item {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 3rem;
            background: linear-gradient(145deg, #0f172a 0%, #0b1324 100%);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            transition: var(--transition);
            position: relative;
        }
        /* Puce lumineuse de la timeline */
        .timeline-item::after {
            content: ''; position: absolute; left: 26px; top: 46px;
            width: 10px; height: 10px; border-radius: 50%;
            background-color: var(--accent);
            box-shadow: 0 0 12px var(--accent);
            z-index: 5; transition: var(--transition);
        }
        .timeline-item:hover {
            transform: translateX(5px) translateY(-2px);
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 25px var(--glow);
        }
        .timeline-item:hover::after {
            background-color: var(--accent-green);
            box-shadow: 0 0 15px var(--accent-green);
            transform: scale(1.3);
        }
        
        .job-meta {
            display: flex; flex-direction: column; gap: 0.5rem;
            padding-left: 2rem;
        }
        .job-meta h3 { font-size: 1.4rem; color: var(--text-main); font-weight: 700; line-height: 1.3; }
        .job-meta .company { font-weight: 600; color: var(--accent); font-size: 1.05rem; }
        .job-meta .date { 
            color: var(--accent-green); font-size: 0.85rem; font-weight: 600;
            display: inline-flex; align-items: center; gap: 0.5rem; margin-top: 0.4rem;
        }
