<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timéo Pedoussaut | Portfolio Cybersécurité & Infra</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #131c2e;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-green: #4ade80;
            --border: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* Navbar */
        nav {
            position: fixed;
            top: 0; width: 100%;
            background-color: rgba(11, 15, 25, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        nav .logo {
            font-weight: bold;
            color: var(--accent);
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 1.5rem;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.3s;
            font-size: 0.95rem;
        }

        nav a:hover { color: var(--accent); }

        /* Hero Section */
        header {
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            margin-top: 60px;
            background: radial-gradient(circle at center, #172554 0%, #0b0f19 100%);
        }

        /* Photo de profil stylisée */
        .profile-img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1.5rem;
            border: 4px solid var(--accent);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            transition: transform 0.3s ease;
        }
        
        .profile-img:hover {
            transform: scale(1.05);
        }

        header h1 {
            font-size: 3.2rem;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
            font-weight: 800;
        }

        header h1 span { color: var(--accent); }

        header .subtitle {
            font-size: 1.3rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            max-width: 700px;
        }

        .btn {
            background-color: var(--accent);
            color: #0b0f19;
            padding: 0.8rem 1.8rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.3s, background-color 0.3s, box-shadow 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-3px);
            background-color: #7dd3fc;
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4);
        }

        /* Sections */
        section {
            padding: 6rem 2rem max(5rem, 8vw);
            max-width: 1100px;
            margin: 0 auto;
        }

        section h2 {
            font-size: 2rem;
            margin-bottom: 2.5rem;
            border-left: 4px solid var(--accent);
            padding-left: 12px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* Grilles et Cartes */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
